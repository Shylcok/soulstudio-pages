<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex,nofollow" />
  <title>灵境同频｜暂时下线</title>
  <style>
    :root { color-scheme: dark; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0d130f; color: #f3f0df; }
    * { box-sizing: border-box; }
    body { min-height: 100vh; margin: 0; display: grid; place-items: center; padding: 32px; background: radial-gradient(circle at 50% 0%, rgba(99, 137, 92, 0.24), transparent 42%), #0d130f; }
    main { max-width: 560px; width: 100%; }
    p { margin: 0 0 14px; color: rgba(243, 240, 223, 0.74); font-size: 17px; line-height: 1.8; }
    h1 { margin: 0 0 18px; font-size: clamp(40px, 8vw, 72px); line-height: 1.05; letter-spacing: 0; }
    .tag { display: inline-flex; margin-bottom: 24px; padding: 8px 12px; border: 1px solid rgba(243, 240, 223, 0.24); border-radius: 999px; color: rgba(243, 240, 223, 0.82); font-size: 14px; }
  </style>
</head>
<body>
  <main>
    <span class="tag">灵境同频</span>
    <h1>暂时下线</h1>
    <p>平台正在临时维护，当前不提供访问。</p>
    <p>恢复时间另行通知。</p>
  </main>
</body>
</html>
